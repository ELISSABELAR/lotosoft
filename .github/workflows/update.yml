name: Data Update

on:
  workflow_dispatch:
    inputs:
      type:
        description: "Grid type"
        required: true
        type: choice
        options:
          - grid-7
          - grid-8
          - grid-12
          - grid-15
      batch_size:
        description: "Batch size (pages)"
        required: false
        default: "20"
      force_page:
        description: "Force page number (debug)"
        required: false
        default: ""
      audit:
        description: "Run audit instead of scraping"
        required: false
        type: boolean
        default: false

  schedule:
    - cron: "0 6 * * *"
    - cron: "0 10 * * *"
    - cron: "0 14 * * *"
    - cron: "0 18 * * *"

permissions:
  contents: write

jobs:
  # ── Job audit ─────────────────────────────────────────────
  audit:
    name: "Audit all grids"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.inputs.audit == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run audit
        run: python audit.py

  # ── Job scraping ───────────────────────────────────────────
  run:
    name: "${{ matrix.type }}"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event.inputs.audit != 'true'
    strategy:
      fail-fast: false
      matrix:
        type:
          - grid-7
          - grid-8
          - grid-12
          - grid-15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -r requirements.txt

      - name: Run
        if: github.event_name == 'schedule' || github.event.inputs.type == matrix.type
        run: |
          ARGS="--type ${{ matrix.type }}"
          ARGS="$ARGS --batch-size ${{ github.event.inputs.batch_size || '20' }}"
          if [ -n "${{ github.event.inputs.force_page }}" ]; then
            ARGS="$ARGS --force-page ${{ github.event.inputs.force_page }}"
          fi
          python app.py $ARGS

      - name: Commit
        if: github.event_name == 'schedule' || github.event.inputs.type == matrix.type
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/ data/ run.log 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "update ${{ matrix.type }}"
            # Rebase sur les éventuels commits parallèles (grid-7/8/12/15 tournent en même temps)
            git pull --rebase origin main
            git push
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.type }}-${{ github.run_id }}"
          path: |
            data/${{ matrix.type }}/
            state/${{ matrix.type }}.json
            run.log
          retention-days: 7
