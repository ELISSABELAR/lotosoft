name: 🏈 LotoFoot Scraper

on:
  workflow_dispatch:
    inputs:
      grid:
        description: "Type de grille"
        required: true
        type: choice
        options: [loto-foot-7, loto-foot-8, loto-foot-12, loto-foot-15]
      batch_size:
        description: "Pages par batch (défaut 20)"
        required: false
        default: "20"
      force_page:
        description: "Forcer une page précise (debug)"
        required: false
        default: ""

  schedule:
    - cron: "0  6 * * *"
    - cron: "0 10 * * *"
    - cron: "0 14 * * *"
    - cron: "0 18 * * *"

permissions:
  contents: write

jobs:
  scrape:
    name: "${{ matrix.grid }}"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        grid: [loto-foot-7, loto-foot-8, loto-foot-12, loto-foot-15]
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.grid == matrix.grid

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }

      - name: 📦 Install
        run: pip install -r requirements.txt

      - name: 🕷️ Scrape — ${{ matrix.grid }}
        run: |
          ARGS="--grid ${{ matrix.grid }}"
          ARGS="$ARGS --batch-size ${{ github.event.inputs.batch_size || '20' }}"
          PAGE="${{ github.event.inputs.force_page }}"
          [ -n "$PAGE" ] && ARGS="$ARGS --force-page $PAGE"
          python main.py $ARGS

      - name: 📋 Résumé fichiers
        if: always()
        run: |
          GRID="${{ matrix.grid }}"
          echo "── state/${GRID}.json ──"
          cat "state/${GRID}.json" 2>/dev/null || echo "(absent)"
          echo ""
          echo "── data/${GRID}/ ──"
          for d in data/${GRID}/*/; do
            [ -d "$d" ] || continue
            season=$(basename "$d")
            count=$(ls "$d"*.json 2>/dev/null | wc -l)
            echo "  ${season}: ${count} grilles"
          done

      - name: 💾 Commit — ${{ matrix.grid }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/ data/ scraper.log 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Rien à commiter"
          else
            STATE="state/${{ matrix.grid }}.json"
            MSG=$(python3 -c "
import json, sys
try:
    d = json.load(open('$STATE'))
    np   = d.get('next_page','?')
    tp   = d.get('total_pages','?')
    done = len(d.get('grilles_done',[]))
    s    = d.get('stats',{})
    ok   = '✅' if d.get('history_complete') else '⏳'
    print(f\"📊 ${{ matrix.grid }} | page {np}/{tp} | {done} grilles | rep={s.get('rep_ok',0)} | {ok}\")
except: print('📊 ${{ matrix.grid }} | update')
" 2>/dev/null || echo "📊 ${{ matrix.grid }} | update")
            git commit -m "$MSG"
            git push
          fi

      - name: 📤 Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.grid }}-${{ github.run_id }}"
          path: |
            data/${{ matrix.grid }}/
            state/${{ matrix.grid }}.json
            scraper.log
          retention-days: 7

  summary:
    name: "📈 Résumé global"
    runs-on: ubuntu-latest
    needs: scrape
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: 📊 Tableau
        run: |
          echo "## 📊 État LotoFoot Scraper" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Grille | Page | Total | Grilles | Rép OK | Hist OK | Skip | Complet |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|---|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
          for GRID in loto-foot-7 loto-foot-8 loto-foot-12 loto-foot-15; do
            STATE="state/${GRID}.json"
            if [ -f "$STATE" ]; then
              python3 - "$STATE" >> $GITHUB_STEP_SUMMARY << 'EOF'
import json, sys
d  = json.load(open(sys.argv[1]))
g  = d["grid_type"]
np = d.get("next_page",1)
tp = d.get("total_pages","?")
dn = len(d.get("grilles_done",[]))
s  = d.get("stats",{})
ok = "✅" if d.get("history_complete") else "⏳"
print(f"| {g} | {np} | {tp} | {dn} | {s.get('rep_ok',0)} | {s.get('hist_ok',0)} | {s.get('skipped',0)} | {ok} |")
EOF
            else
              echo "| ${GRID} | — | — | — | — | — | — | ⬜ |" >> $GITHUB_STEP_SUMMARY
            fi
          done
