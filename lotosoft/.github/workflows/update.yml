name: Data Update

on:
  workflow_dispatch:
    inputs:
      type:
        description: "Grid type"
        required: true
        type: choice
        options:
          - grid-7
          - grid-8
          - grid-12
          - grid-15
          - grid-14
      batch_size:
        description: "Batch size"
        required: false
        default: "20"
      force_page:
        description: "Force page (debug)"
        required: false
        default: ""

  schedule:
    - cron: "0 6 * * *"
    - cron: "0 10 * * *"
    - cron: "0 14 * * *"
    - cron: "0 18 * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        type:
          - grid-7
          - grid-8
          - grid-12
          - grid-15
          - grid-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -r requirements.txt

      - name: Run
        if: github.event_name == 'schedule' || github.event.inputs.type == matrix.type
        run: |
          ARGS="--type ${{ matrix.type }}"
          ARGS="$ARGS --batch-size ${{ github.event.inputs.batch_size || '20' }}"
          if [ -n "${{ github.event.inputs.force_page }}" ]; then
            ARGS="$ARGS --force-page ${{ github.event.inputs.force_page }}"
          fi
          python app.py $ARGS

      - name: Commit
        if: github.event_name == 'schedule' || github.event.inputs.type == matrix.type
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/ data/ run.log 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "update ${{ matrix.type }}"
            git push
          fi

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.type }}-${{ github.run_id }}"
          path: |
            state/${{ matrix.type }}.json
            run.log
          retention-days: 7
